name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moto_bot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/moto_bot_test
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: "test"
          YOOKASSA_SHOP_ID: ""
          YOOKASSA_SECRET_KEY: ""
        run: uv run alembic upgrade head || true
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/moto_bot_test
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: "test"
          YOOKASSA_SHOP_ID: ""
          YOOKASSA_SECRET_KEY: ""
          PLATFORM: telegram
        run: uv run pytest tests/ -v --tb=short || true
